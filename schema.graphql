"""Represents app data."""
type App implements Node & ObjectWithMetadata {
  """The ID of the app."""
  id: ID!

  """List of private metadata items. Requires staff permissions to access."""
  privateMetadata: [MetadataItem!]!

  """
  A single key from private metadata. Requires staff permissions to access.
  
  Tip: Use GraphQL aliases to fetch multiple keys.
  
  Added in Saleor 3.3.
  """
  privateMetafield(key: String!): String

  """
  Private metadata. Requires staff permissions to access. Use `keys` to control which fields you want to include. The default is to include everything.
  
  Added in Saleor 3.3.
  """
  privateMetafields(keys: [String!]): Metadata

  """List of public metadata items. Can be accessed without permissions."""
  metadata: [MetadataItem!]!

  """
  A single key from public metadata.
  
  Tip: Use GraphQL aliases to fetch multiple keys.
  
  Added in Saleor 3.3.
  """
  metafield(key: String!): String

  """
  Public metadata. Use `keys` to control which fields you want to include. The default is to include everything.
  
  Added in Saleor 3.3.
  """
  metafields(keys: [String!]): Metadata

  """
  Canonical app ID from the manifest
  
  Added in Saleor 3.19.
  """
  identifier: String

  """List of the app's permissions."""
  permissions: [Permission!]

  """The date and time when the app was created."""
  created: DateTime

  """Determine if app will be set active or not."""
  isActive: Boolean

  """Name of the app."""
  name: String

  """Type of the app."""
  type: AppTypeEnum

  """
  Last 4 characters of the tokens.
  
  Requires one of the following permissions: MANAGE_APPS, OWNER.
  """
  tokens: [AppToken!]

  """
  List of webhooks assigned to this app.
  
  Requires one of the following permissions: MANAGE_APPS, OWNER.
  """
  webhooks: [Webhook!]

  """Description of this app."""
  aboutApp: String

  """Description of the data privacy defined for this app."""
  dataPrivacy: String @deprecated(reason: "This field will be removed in Saleor 4.0. Use `dataPrivacyUrl` instead.")

  """URL to details about the privacy policy on the app owner page."""
  dataPrivacyUrl: String

  """Homepage of the app."""
  homepageUrl: String

  """Support page for the app."""
  supportUrl: String

  """URL to iframe with the configuration for the app."""
  configurationUrl: String @deprecated(reason: "This field will be removed in Saleor 4.0. Use `appUrl` instead.")

  """URL to iframe with the app."""
  appUrl: String

  """
  URL to manifest used during app's installation.
  
  Added in Saleor 3.5.
  """
  manifestUrl: String

  """Version number of the app."""
  version: String

  """JWT token used to authenticate by third-party app."""
  accessToken: String

  """
  The App's author name.
  
  Added in Saleor 3.13.
  
  Note: this API is currently in Feature Preview and can be subject to changes at later point.
  """
  author: String

  """
  App's dashboard extensions.
  
  Added in Saleor 3.1.
  """
  extensions: [AppExtension!]!
}

